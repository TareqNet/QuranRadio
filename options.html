<!DOCTYPE html>
<html id="html-root">
<head>
    <meta charset="utf-8">
    <title>__MSG_optionsTitle__</title>
    <link rel="stylesheet" type="text/css" href="css/options.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1 data-i18n="optionsHeader">Options</h1>
            <select id="sel-lang" class="lang-select" style="font-size: 16px; padding: 5px;">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="tr">Türkçe</option>
                <option value="fa">فارسی</option>
                <option value="es">Español</option>
            </select>
        </header>

        <div class="main-content">
            <!-- Search & Add Section -->
            <section class="add-section">
                
                <!-- Radios Box -->
                <div class="box">
                    <h2 data-i18n="radiosHeader">Live Radios</h2>
                    <input type="text" id="radios-search" data-i18n-placeholder="searchPlaceholder" placeholder="Search...">
                    <ul id="radios-results" class="results-list"></ul>
                </div>

                <!-- Reciters Box -->
                <div class="box">
                    <h2 data-i18n="recitersHeader">Reciters</h2>
                    <input type="text" id="reciters-search" data-i18n-placeholder="searchPlaceholder" placeholder="Search...">
                    <ul id="reciters-results" class="results-list"></ul>
                </div>
            </section>

            <!-- User List Section -->
            <section class="mylist-section">
                <div class="box">
                    <h2 data-i18n="myListHeader">My List</h2>
                    <p id="empty-list-msg" data-i18n="noItemsMessage">Your list is empty.</p>
                    <ul id="user-list" class="user-list"></ul>
                </div>
            </section>
        </div>

        <div id="toast" class="toast"></div>
    </div>
    <script src="js/options.js"></script>
</body>
</html>
